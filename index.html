<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Vivint System Activation</title>

  <style>
   :root{
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;

      /* === THEME (TEAL background, black accents, white content) === */
      --teal: #05E5AF;          /* from your screenshot */
      --bg: var(--teal);        /* teal page background */
      --ink: #000000;           /* black accent */
      --surface: #FFFFFF;       /* white cards */
      --surface2: #F6F7F9;      /* soft gray */
      --text: #0B0F14;          /* dark text on white */
      --muted: #4B5563;
      --border: rgba(0,0,0,.14);
      --shadow: 0 14px 40px rgba(0,0,0,.25);
      --radius: 16px;
    }

    body{
      margin:0;
      background: var(--bg);
      color: var(--ink);
    }

    .wrap{ max-width:1100px; margin:0 auto; padding:18px; }
    .grid{ display:grid; grid-template-columns: 1.2fr 0.8fr; gap:14px; }

    /* Cards are WHITE with BLACK accents */
    .card{
      background: var(--surface);
      color: var(--text);
      border: 2px solid rgba(0,0,0,.10);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow);
    }

    h1{ font-size:18px; margin:0; }
    h2{ font-size:14px; margin:0 0 10px; color: var(--muted); letter-spacing:.2px; }
    .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }

    /* Top bar on teal background */
    .topbarTitle{ color: var(--ink); font-weight: 900; }
    .topbarPills .pill{
      background: rgba(255,255,255,.65);
      border-color: rgba(0,0,0,.18);
      backdrop-filter: blur(2px);
    }
    .topbarPills strong{ color: var(--ink); }
    button.ghost{
      background: rgba(0,0,0,.08);
      color: var(--ink);
      border: 1px solid rgba(0,0,0,.22);
    }
    button.ghost:hover{ background: rgba(0,0,0,.12); border-color: rgba(0,0,0,.28); }

    /* Inputs/buttons on white cards */
    button, select, input, textarea{
      background: #FFFFFF;
      color: var(--ink);
      border: 1px solid rgba(0,0,0,.22);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      box-shadow: 0 1px 0 rgba(0,0,0,.03);
    }
    button{ cursor:pointer; }
    button:hover{ border-color: rgba(0,0,0,.35); }

    button.primary{
      background: var(--ink);
      border-color: rgba(0,0,0,.65);
      color: var(--teal);
      font-weight: 800;
    }
    button.primary:hover{ filter: brightness(.95); }

    button.danger{
      background:#FFFFFF;
      color:#000;
      border-color: rgba(229, 57, 53, .75);
    }
    button.danger:hover{ border-color: rgba(229, 57, 53, 1); }

    button:disabled{ opacity:.45; cursor:not-allowed; }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(0,0,0,.18);
      background: var(--surface2);
      color: var(--ink);
    }
    .muted{ color: var(--muted); }
    .divider{ height:1px; background: rgba(0,0,0,.10); margin:12px 0; }
    .menu{ display:none; margin-top:10px; }
    .menu.open{ display:block; }
    .menu button{ width:100%; text-align:left; margin-bottom: 8px; }

    .status{ font-size:12px; color: rgba(0,0,0,.75); }

    /* BIG message area (white box, black text, black accent border) */
    .bigWrap{
      border: 2px solid rgba(0,0,0,.55);
      background: #FFFFFF;
      border-radius: 14px;
      padding: 14px;
      min-height: 340px;
      display:flex;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.03);
    }
    .big{
      font-size:16px;
      line-height:1.55;
      white-space:pre-wrap;
      width:100%;
      overflow:auto;
      color:#000;
    }

    .flash{ animation: flash 900ms ease-out; }
    @keyframes flash{
      0%   { box-shadow: 0 0 0 0 rgba(0,0,0,0); transform: scale(1); }
      15%  { box-shadow: 0 0 0 6px rgba(0,0,0,.12); }
      35%  { box-shadow: 0 0 0 10px rgba(0,0,0,.08); }
      100% { box-shadow: 0 0 0 0 rgba(0,0,0,0); transform: scale(1); }
    }

    .alert{ border:1px solid rgba(229,57,53,.65); background: rgba(229,57,53,.08); padding: 10px 12px; border-radius: 12px; }
    .ok{ border:1px solid rgba(0,0,0,.55); background: rgba(5,229,175,.18); padding: 10px 12px; border-radius: 12px; }

    .small{ font-size: 12px; }
    .rightcol textarea{ min-height: 190px; }
    .mono{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size: 12px; }

    /* Loading overlay */
    .overlay{
      position: fixed; inset: 0;
      background: rgba(0,0,0,.35);
      display:none;
      align-items:center;
      justify-content:center;
      z-index: 9999;
      backdrop-filter: blur(2px);
    }
    .overlay.open{ display:flex; }
    .loaderCard{
      width: min(440px, 92vw);
      background:#FFFFFF;
      color: var(--text);
      border:2px solid rgba(0,0,0,.12);
      border-radius: 18px;
      padding: 16px 18px;
      box-shadow: var(--shadow);
      display:flex;
      gap:14px;
      align-items:center;
    }
    .spinner{
      width:26px; height:26px;
      border-radius:999px;
      border: 3px solid rgba(0,0,0,.12);
      border-top-color: #000;
      animation: spin .8s linear infinite;
      flex:0 0 auto;
    }
    @keyframes spin{ to{ transform: rotate(360deg);} }

    /* CUSTOMER MODE */
    .csidOnlyWrap{ display:none; }
    .customerMode .grid{ grid-template-columns: 1fr; }
    .customerMode #rightCard{ display:none; }
    .customerMode .csidOnlyWrap{ display:block; margin-top:10px; }

    /* Mobile */
    @media (max-width: 900px){
      .wrap{ padding: 12px; }
      .grid{ grid-template-columns: 1fr; }
      .row.actions button{ width: 100%; }
      .row.topbar{ align-items:flex-start; }
      button, select, input, textarea{ width: 100%; box-sizing: border-box; }
      .pill{ width:100%; box-sizing:border-box; justify-content: space-between; }
      .row{ gap: 10px; }
      .row.compact{ flex-direction: column; align-items: stretch; }
      .menu button{ padding: 14px; }
      .bigWrap{ min-height: 420px; }
    }
  </style>
</head>

<body>
  <div class="overlay" id="overlay">
    <div class="loaderCard">
      <div class="spinner"></div>
      <div style="display:flex; flex-direction:column; gap:6px;">
        <div style="font-weight:900;">One moment…</div>
        <div class="muted small">Preparing the next message.</div>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div class="row topbar" style="justify-content: space-between;">
      <h1 class="topbarTitle">Vivint System Activation</h1>

      <div class="row compact topbarPills">
        <span class="pill">Panel: <strong id="panelPill">Not set</strong></span>
        <span class="pill">Step: <strong id="stepPill">—</strong></span>
        <button class="ghost" id="resetBtn">Reset</button>
      </div>
    </div>

    <div class="grid">
      <!-- LEFT -->
      <div class="card">
        <h2>Message</h2>

        <div class="bigWrap" id="bigWrap">
          <div id="botMessage" class="big"></div>
        </div>

        <div class="csidOnlyWrap" id="csidOnlyWrap">
          <div class="divider"></div>
          <div class="row compact">
            <span class="pill">CSID: <strong id="csidOnlyText">—</strong></span>
          </div>
          <div class="muted small">If the monitoring station asks, share this CSID.</div>
        </div>

        <div class="divider-horizontal"></div>

     <div class="row actions">
  <div class="group primary-back">
    <button class="primary" id="doneBtn">✅ Done</button>
    <button id="backBtn">⬅️ Back one step</button>
    <div class="divider"></div>
  </div>

  <div class="group other-actions">
    <button id="issuesBtn">⚠️ I’m having an issue</button>
    <button id="lostBtn">🧭 I can’t find that screen</button>
    <button class="danger" id="escalateBtn">🚨 I need help from a person</button>
    <div class="divider"></div>
  </div>
</div>

        <div id="issuesMenu" class="menu"></div>

        <div class="divider-horizontal"></div>
        <div class="row compact">
          <button id="copyBtn">📋 Copy message</button>
          <span class="status" id="statusLine"></span>
        </div>

        <div id="helperPanel" style="margin-top:12px;"></div>
      </div>

      <!-- RIGHT -->
      <div class="card rightcol" id="rightCard">
        <h2>Setup Details (Agent)</h2>

        <div class="row compact">
          <label class="pill">
            Panel type:
            <select id="panelSelect">
              <option value="">Select…</option>
              <option value="smarthub">SmartHub</option>
              <option value="skycontrol">SkyControl</option>
            </select>
          </label>
        </div>

        <div class="divider"></div>

        <h2>Information</h2>
        <div class="row compact">
          <label class="pill">CSID: <input id="csid" placeholder="EZ123456" /></label>
          <label class="pill">Registration code: <input id="reg" placeholder="ABCD-EFGH-IJKL-LMNO" /></label>
        </div>
        <div class="row compact">
          <label class="pill">Service # (top-right): <input id="serviceNum" placeholder="Service number…" /></label>
        </div>

        <div class="divider"></div>

        <h2>Escalation message</h2>
        <textarea id="escalationText" class="mono"></textarea>
        <div class="row compact">
          <button id="copyEscBtn">📋 Copy escalation</button>
        </div>

        <div class="divider"></div>

        <h2>Share</h2>
        <div class="row compact">
          <button class="primary" id="makeLinkBtn">🔗 Generate customer link</button>
          <button id="copyLinkBtn" disabled>📋 Copy link</button>
        </div>
        <div class="row compact" style="width:100%;">
          <input id="shareLink" style="width:100%;" placeholder="Link will appear here…" readonly />
        </div>
        <div class="muted small" style="margin-top:6px;">
          Tip: Uses a hash-link so values are not typically sent as referrer data.
        </div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "vivint_activation_flow_customer_v6";
    let isCustomerMode = false;

    function stripDashes(code) { return (code || "").replace(/-/g, ""); }

    function normalizeReg(code) {
      return (code || "").toUpperCase().replace(/[^A-Z0-9]/g, "");
    }
    function formatRegWithDashes(code) {
      const raw = normalizeReg(code);
      if (!raw) return "";
      return raw.match(/.{1,4}/g).join("-");
    }

    const FLOW = {
      steps: [
        {
          id: "step_1",
          name: "Main screen check",
          message: () => `Please verify:
1) The panel is powered on
2) The date and time (top-left) look correct

When that’s done, tap Done.`,
          ui: {
            issues: [
              { id: "panel_not_on", label: "The panel is not on / screen is black" },
              { id: "panel_still_not_on_after_power", label: "Still not on after checking power" },
              { id: "bad_date_time", label: "Date/time are not correct" }
            ]
          },
          intents: [
            { id: "panel_not_on", response: "Please check that the small white power box below the panel is plugged in, and that both wires are connected securely." },
            { id: "panel_still_not_on_after_power", response: () => powerCycleForPanel(state.panel_type) },
            { id: "bad_date_time", response: () => `Let’s reboot the panel:\n\n${rebootForPanel(state.panel_type)}` }
          ]
        },
        {
          id: "step_2",
          name: "Register the panel",
          message: () => {
            const rcRaw = (state.registration_code || "{{registration_code}}");
            const rcPretty = formatRegWithDashes(rcRaw) || rcRaw;

            return `Tap the 3 dots (bottom-right) → Software Version.
When prompted, enter 2203.
Tap “Register Panel”.

Registration code (type it WITHOUT dashes):
${rcPretty}

(Example: you will type it as ${stripDashes(rcPretty)})

When “Registering” goes away, tap Done.`;
          },
          ui: {
            issues: [
              { id: "sim_status_too_old", label: "SIM status is too old" },
              { id: "dns_error", label: "DNS error / time not synced" },
              { id: "no_phone_number", label: "No phone number found" },
              { id: "vivint_services_no_response", label: "Vivint services did not respond" },
              { id: "code_2203_failed", label: "2203 didn’t work" },
              { id: "no_register_panel", label: "I don’t see “Register Panel”" }
            ]
          },
          intents: [
            { id: "sim_status_too_old", response: "Tap Back twice → Monitoring and Cellular → scroll to the bottom → Advanced Cellular Status → scroll to the bottom → Reset Cellular Module. Then tap Back twice and try registering again." },
            { id: "dns_error", response: () => `Let’s reboot the panel:\n\n${rebootForPanel(state.panel_type)}` },
            { id: "no_phone_number", response: () => `Let’s reboot the panel:\n\n${rebootForPanel(state.panel_type)}` },
            { id: "vivint_services_no_response", response: () => `Let’s reboot the panel:\n\n${rebootForPanel(state.panel_type)}` },
            { id: "no_register_panel", response: "Tap “Monitoring and Cellular” → scroll down → tap “Unregister Panel” → tap “Unregister”. Tap Back and “Register Panel” should appear." },
            { id: "code_2203_failed", response: () => `Tap Cancel. Please share the Service Number (top-right), then reboot the panel:\n\n${rebootForPanel(state.panel_type)}\n\nAfter it reboots, we’ll try again.` }
          ]
        },
        {
          id: "step_3",
          name: "Two-Way Voice Test",
          message: () => {
            const csid = state.csid || "{{csid}}";
            return `Tap “System Testing” → scroll down → tap “Two-Way Voice Test”.
To START the test, tap “Two-Way Voice Test” one more time (or tap Start Test).

When the voice finishes and it beeps, clearly say: “CORRECT CSID”.

If it says "This concludes the test" The test was successful!

If it says "You are now being connected to an operator" they will ask you for the CSID and then complete the test

When that is done tap Done below

CSID (if asked): ${csid}`;
          },
          ui: {
            issues: [
              { id: "in_call_or_waiting_no_voice_kicks_out", label: "In Call / Waiting for Status (no voice), then it kicks out" },
              { id: "not_ready_for_test", label: "Not ready for test" },
              { id: "failed_to_initialize", label: "Failed to initialize" },
              { id: "dialing_then_ends", label: "Dialing then ends/hangs up" },
              { id: "waiting_for_status", label: "Stuck on waiting for status" },
              { id: "operator_never_spoke", label: "Operator never spoke" }
            ]
          },
          intents: [
            { id: "in_call_or_waiting_no_voice_kicks_out", response: () => escalate("Two-way test: In Call/Waiting for Status (no voice) then kick out") },
            { id: "not_ready_for_test", response: () => `Tap Back twice → Monitoring and Cellular → Advanced Cellular Status → Reset Cellular Module. Then try the Two-Way Voice Test again. If it still says “Not ready for test,” reboot:\n\n${rebootForPanel(state.panel_type)}` },
            { id: "failed_to_initialize", response: "Tap Back. Turn ON Test Mode for 10 seconds, then turn it OFF. Try the Two-Way Voice Test again." },
            { id: "dialing_then_ends", response: "Tap Back twice → Monitoring and Cellular → Advanced Cellular Status → Reset Cellular Module. Then try the Two-Way Voice Test again." },
            { id: "waiting_for_status", response: () => `If it stays stuck for a while, reboot:\n\n${rebootForPanel(state.panel_type)}\n\nAfter reboot, try the Two-Way Voice Test again.` },
            { id: "operator_never_spoke", response: "Tap Back twice → Monitoring and Cellular → Advanced Cellular Status → Reset Cellular Module. Then try the Two-Way Voice Test again." }
          ]
        },
        {
          id: "step_4",
          name: "Set up PIN (and Users menu)",
          message: () => `Set up your PIN:

1) Press the back button once, scroll up to the top and turn off the sounder (it should be greyed out)
2) Press the back button two times
3) Tap on Users on the left
4) If it asks for a code, enter 2203
5) Tap your name
6) Tap the existing PIN
7) Type your new 4-digit PIN → tap Save
8) Re-enter the new PIN → tap Save

When that’s done, tap Done.`,
          ui: {
            issues: [
              { id: "cant_find_users", label: "I can’t find Users" },
              { id: "2203_didnt_work_here", label: "2203 didn’t work here" },
              { id: "pin_save_failed", label: "It won’t let me save / error saving PIN" },
              { id: "updating_user_pin_stuck", label: "Stuck on updating user PIN" },
              { id: "user_gone", label: "I don't see my name"}
            ]
          },
          intents: [
            { id: "cant_find_users", response: "That’s okay. Tap Back until you’re on the Home Screen, then tap the 3 dots (bottom-right) and select Users." },
            { id: "2203_didnt_work_here", response: () => escalate("2203 failed at Users/PIN screen") },
            { id: "pin_save_failed", response: "Try the PIN again. If it still fails, back out, reboot the panel, then try again." },
            { id: "updating_user_pin_stuck", response: "Tap “Stop”, then tap the X. Your new PIN should still be saved." },
            { id: "user_gone", response: "If you don't see your name click add new user at the bottom and enter your name. Then click done and continue at Tap the existing pin" }
          ]
        },
        {
          id: "step_5",
          name: "Panic + Arming test",
          message: () => `Now we’ll test Panic and Arming.

Panic test:
1) Tap the white plus/cross icon at the bottom
2) Press and hold PANIC for 2 seconds
3) Enter 2580 to disarm (or your personal PIN if needed)
4) Tap the X (top-right) to exit “Recent Alarms”

Arming test:
1) Tap “Disarmed”
2) Slide left into Stay mode
3) Disarm by dragging down and entering your 4-digit PIN

When finished, tap Done.`,
          ui: {
            issues: [
              { id: "will_this_sound", label: "Will this be loud / sound the alarm?" },
              { id: "duress_not_working", label: "2580 isn’t working to disarm" },
              { id: "not_ready_to_arm", label: "System says not ready to arm" },
              { id: "nothing_happens", label: "Nothing happens when I press PANIC" }
            ]
          },
          intents: [
            { id: "will_this_sound", response: "If the Sounder is off, it should not be loud." },
            { id: "duress_not_working", response: "That’s okay — just use your personal PIN to disarm for now." },
            { id: "not_ready_to_arm", response: "That’s okay — you can tap “Arm Anyway” and enter your PIN. We can fix the warning later." },
            { id: "nothing_happens", response: "Make sure you are pressing and holding the button, if that still does not work try pressing and holding emergency or fire."}
          ]
        },
        {
          id: "step_6",
          name: "Emergency contact + verbal password",
          message: () => `Last step — choose what you want to do next:
• Add Emergency Contact
• Set Verbal Password
• App Invite

To bring up the steps for these options tap "Im having an issue"

Or tap Done if you’re finished.`,
          ui: {
            issues: [
              { id: "collect_emergency_contact", label: "Add emergency contact" },
              { id: "verbal_password_info", label: "What is a verbal password?" },
              { id: "app_invite_instructions", label: "Help with app invite" }
            ]
          },
          intents: [
            { id: "collect_emergency_contact", response: "Please share the first name, last name, and phone number for an emergency contact." },
            { id: "verbal_password_info", response: "A verbal password is a word or number you say if we call during an alarm to confirm you’re safe." },
            { id: "app_invite_instructions", response: "Tap the 3 dots (bottom-right) → Users → select your name. Enter your phone number and email address, then tap “Send invitation.”" }
          ]
        }
      ]
    };

    function smartHubReboot2Min() {
      return `Slide the panel straight up off the wall. Remove the battery from the back, wait 10 seconds, then put the battery back in and place the panel back on the wall. It should say “Your system is rebooting.” This usually takes about 2 minutes. Let me know when it finishes and you’re back on the main screen.`;
    }
    function skyControlReboot5to10() {
      return `Tap the Home button (bottom-right) → tap the 3 dots → General → enter 2203 (or your code if you have one) → scroll down → tap Reboot. You should see “Connecting Services.” This reboot usually takes 5–10 minutes. Let me know when it finishes and you’re back on the main screen.`;
    }
    function rebootForPanel(panelType) { return (panelType === "skycontrol") ? skyControlReboot5to10() : smartHubReboot2Min(); }
    function powerCycleForPanel(panelType) {
      if (panelType === "skycontrol") return `Please do a reboot (do not slide the panel off the wall):\n\n${skyControlReboot5to10()}`;
      return `Slide the panel straight up off the wall. Make sure the battery is fully seated on the back of the panel. Place the panel back on the wall and make sure it clicks into place.`;
    }

    function homeReturnInstruction(panelType) {
      if (panelType === "skycontrol") return "Tap the House/Home button at the bottom-right.";
      return "Tap the X inside of the shield in the bottom-left.";
    }

    function lostTextForStep(stepId) {
      const home = homeReturnInstruction(state.panel_type);
      if (stepId === "step_1") return `If you’re on the wrong screen:\n\n1) ${home}\n\nOnce you’re back on the main screen, check the date/time (top-left), then tap Done here.`;
      if (stepId === "step_2") return `If you’re on the wrong screen:\n\n1) ${home}\n2) Tap the 3 dots\n3) Tap Software Version\n4) Enter 2203\n\nOnce you’re in, continue with registration, then tap Done here.`;
      if (stepId === "step_3") return `If you’re on the wrong screen:\n\n1) ${home}\n2) Tap the 3 dots\n3) Tap Software Version\n4) Enter 2203\n5) Tap System Testing\n6) Scroll down and tap Two-Way Voice Test\n7) Tap Two-Way Voice Test again (or tap Start Test)\n8) When it beeps, say: “CORRECT CSID”\n\nThen tap Done here.`;
      if (stepId === "step_4") return `If you’re on the wrong screen:\n\n1) ${home}\n2) Tap the 3 dots\n3) Tap Software Version\n4) Enter 2203\n5) Tap System Testing\n6) Make sure the Sounder switch is gray/black (OFF)\n7) Tap Back twice\n8) Tap Users\n\nThen continue with the PIN steps, and tap Done here when finished.`;
      if (stepId === "step_5") return `If you’re on the wrong screen:\n\n1) ${home}\n2) Tap the white plus sign / cross symbol at the bottom\n\nThen continue the Panic test and tap Done here when finished.`;
      return `If you’re on the wrong screen:\n\n1) ${home}\n2) Tap the 3 dots → Users\n\nThen continue and tap Done here when finished.`;
    }

    function defaultState() {
      return {
        current_step_id: "step_1",
        panel_type: "",
        csid: "",
        registration_code: "",
        service_number: "",
        history: ["step_1"],
        return_step_id: "step_1",
        return_step_message: "",
        pending_return_to_step_on_done: false
      };
    }

    let state = loadState() || defaultState();
    const escalationDefault = `Thanks — I’m going to bring in a team member to help you from here.`;

    const botMessageEl = document.getElementById("botMessage");
    const bigWrap = document.getElementById("bigWrap");
    const stepPill = document.getElementById("stepPill");
    const panelPill = document.getElementById("panelPill");
    const issuesMenuEl = document.getElementById("issuesMenu");
    const statusLine = document.getElementById("statusLine");
    const helperPanel = document.getElementById("helperPanel");
    const csidInput = document.getElementById("csid");
    const regInput = document.getElementById("reg");
    const serviceInput = document.getElementById("serviceNum");
    const panelSelect = document.getElementById("panelSelect");
    const overlay = document.getElementById("overlay");
    const csidOnlyText = document.getElementById("csidOnlyText");

    const escalationTextEl = document.getElementById("escalationText");
    escalationTextEl.value = escalationDefault;

    const makeLinkBtn = document.getElementById("makeLinkBtn");
    const copyLinkBtn = document.getElementById("copyLinkBtn");
    const shareLinkInput = document.getElementById("shareLink");

    function getStep(stepId) { return FLOW.steps.find(s => s.id === stepId); }
    function setStatus(msg) { statusLine.textContent = msg || ""; }
    function escapeHtml(s) {
      return (s||"").replace(/[&<>"']/g, (m)=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;" }[m]));
    }
    function showInfo(msg) { helperPanel.innerHTML = `<div class="ok">${escapeHtml(msg).replace(/\n/g,"<br>")}</div>`; }
    function showAlert(msg) { helperPanel.innerHTML = `<div class="alert">${escapeHtml(msg).replace(/\n/g,"<br>")}</div>`; }
    function clearHelper() { helperPanel.innerHTML = ""; }
    function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    function loadState() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return null; } }
    function setOverlay(open) { overlay.classList.toggle("open", !!open); }
    function withLoading(fn, delayMs = 250) {
      setOverlay(true);
      setTimeout(() => { try { fn(); } finally { setOverlay(false); } }, delayMs);
    }

    function flashMessageBox() {
      bigWrap.classList.remove("flash");
      void bigWrap.offsetWidth;
      bigWrap.classList.add("flash");
    }

    function setBotMessage(text) {
      botMessageEl.textContent = text;
      flashMessageBox();
      bigWrap.scrollTop = 0;
    }

    function interpolateStepMessage(step) {
      let msg = typeof step.message === "function" ? step.message() : step.message;
      msg = msg.replace(/\{\{csid\}\}/g, state.csid || "{{csid}}");
      msg = msg.replace(/\{\{registration_code\}\}/g, state.registration_code || "{{registration_code}}");
      return msg;
    }

    function gotoStep(stepId) {
      state.current_step_id = stepId;
      state.history.push(stepId);
      saveState();
      render();
      flashMessageBox();
    }

    function goBackOneStep() {
      if (state.history.length <= 1) return;
      state.history.pop();
      state.current_step_id = state.history[state.history.length - 1];
      saveState();
      render();
      flashMessageBox();
    }

    function escalate(reason) {
      const esc = escalationTextEl.value || escalationDefault;
      setStatus(`Help requested: ${reason}`);
      return esc;
    }

    function openTempMessageThenReturnOnDone(tempMessage) {
      const step = getStep(state.current_step_id);
      state.return_step_id = state.current_step_id;
      state.return_step_message = step ? interpolateStepMessage(step) : "";
      state.pending_return_to_step_on_done = true;
      saveState();

      setBotMessage(tempMessage);
      showInfo("After you try that, tap Done to return to the step.");
    }

    function handleIntent(intentId) {
      const step = getStep(state.current_step_id);
      const intent = step?.intents?.find(i => i.id === intentId);
      if (!intent) { showAlert("No message found for that option."); return; }

      let response = intent.response;
      if (typeof response === "function") response = response();

      openTempMessageThenReturnOnDone(response);
    }

    function handleLost() {
      const txt = lostTextForStep(state.current_step_id);
      openTempMessageThenReturnOnDone(txt);
    }

    function encodeB64Url(str) {
      return btoa(unescape(encodeURIComponent(str)))
        .replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
    }
    function decodeB64Url(b64url) {
      const b64 = b64url.replace(/-/g, "+").replace(/_/g, "/") + "===".slice((b64url.length + 3) % 4);
      return decodeURIComponent(escape(atob(b64)));
    }
    function buildShareLinkFromState() {
      const payload = {
        panel: state.panel_type || "",
        csid: state.csid || "",
        reg: state.registration_code || "",
        service: state.service_number || ""
      };
      const packed = encodeB64Url(JSON.stringify(payload));
      const base = `${location.origin}${location.pathname}`;
      return `${base}#prefill=${packed}`;
    }

    function applyCustomerMode() {
      isCustomerMode = true;
      document.body.classList.add("customerMode");
      panelSelect.disabled = true;
      csidInput.readOnly = true;
      regInput.readOnly = true;
      serviceInput.readOnly = true;

      state.current_step_id = "step_1";
      state.history = ["step_1"];
      saveState();
    }

    function applyPrefill(payload) {
      if (payload.panel) state.panel_type = String(payload.panel).toLowerCase();
      if (payload.csid) state.csid = String(payload.csid).trim();
      if (payload.reg) state.registration_code = String(payload.reg).trim();
      if (payload.service) state.service_number = String(payload.service).trim();
      state.current_step_id = "step_1";
      state.history = ["step_1"];
      saveState();
      applyCustomerMode();
    }

    function tryPrefillFromUrl() {
      const hash = location.hash || "";
      const m = hash.match(/prefill=([^&]+)/);
      if (m && m[1]) {
        try {
          const payload = JSON.parse(decodeB64Url(m[1]));
          applyPrefill(payload);
          return true;
        } catch {}
      }
      return false;
    }

    function render() {
      const step = getStep(state.current_step_id) || getStep("step_1");
      if (!getStep(state.current_step_id)) {
        state.current_step_id = "step_1";
        state.history = ["step_1"];
        saveState();
      }

      const panelLabel = state.panel_type
        ? (state.panel_type === "skycontrol" ? "SkyControl" : "SmartHub")
        : "Not set";

      panelPill.textContent = panelLabel;
      stepPill.textContent = `${step?.id || "—"} • ${step?.name || ""}`;

      panelSelect.value = state.panel_type || "";
      csidInput.value = state.csid || "";
      regInput.value = state.registration_code || "";
      serviceInput.value = state.service_number || "";

      csidOnlyText.textContent = state.csid ? state.csid : "—";

      if (!state.pending_return_to_step_on_done) {
        const msg = step ? interpolateStepMessage(step) : "Step not found.";
        setBotMessage(msg);
      }

      buildIssuesMenu(step);

      if (isCustomerMode) {
        clearHelper();
      } else {
        if (!state.panel_type) setStatus("Agent: choose panel type on the right before generating a customer link.");
        else setStatus("");
      }
    }

    function buildIssuesMenu(step) {
      issuesMenuEl.innerHTML = "";
      if (!step?.ui?.issues?.length) return;

      const title = document.createElement("div");
      title.className = "muted small";
      title.style.marginBottom = "8px";
      title.textContent = "Choose the issue you’re seeing:";
      issuesMenuEl.appendChild(title);

      step.ui.issues.forEach(item => {
        const btn = document.createElement("button");
        btn.textContent = item.label;
        btn.onclick = () => withLoading(() => {
          handleIntent(item.id);
          issuesMenuEl.classList.remove("open");
        }, 200);
        issuesMenuEl.appendChild(btn);
      });
    }

    document.getElementById("doneBtn").onclick = () => withLoading(() => {
      if (state.pending_return_to_step_on_done) {
        const step = getStep(state.return_step_id || state.current_step_id);
        const restore = state.return_step_message || (step ? interpolateStepMessage(step) : "");
        state.pending_return_to_step_on_done = false;
        saveState();

        setBotMessage(restore || (step ? interpolateStepMessage(step) : botMessageEl.textContent));
        showInfo("Back to the step. When you finish the step, tap Done again to continue.");
        return;
      }

      const idx = FLOW.steps.findIndex(s => s.id === state.current_step_id);
      if (idx < 0) { state.current_step_id = "step_1"; state.history = ["step_1"]; saveState(); render(); return; }
      const next = FLOW.steps[idx + 1];
      if (!next) { showInfo("All set — you’re finished."); return; }
      gotoStep(next.id);
    }, 200);

    document.getElementById("issuesBtn").onclick = () => {
      const step = getStep(state.current_step_id);
      if (!step) return;
      issuesMenuEl.classList.toggle("open");
    };

    document.getElementById("lostBtn").onclick = () => withLoading(() => {
      handleLost();
      issuesMenuEl.classList.remove("open");
    }, 200);

    document.getElementById("escalateBtn").onclick = () => withLoading(() => {
      state.pending_return_to_step_on_done = false;
      saveState();
      setBotMessage("To chat with a representative, text (385) 425-0752.");
      showAlert("If you already texted and want to keep going, continue with the steps above.");
    }, 200);

    document.getElementById("copyBtn").onclick = async () => {
      try { await navigator.clipboard.writeText(botMessageEl.textContent); setStatus("Copied."); }
      catch { setStatus("Copy failed (browser permissions)."); }
    };

    document.getElementById("copyEscBtn").onclick = async () => {
      try { await navigator.clipboard.writeText(escalationTextEl.value); setStatus("Copied escalation message."); }
      catch { setStatus("Copy failed (browser permissions)."); }
    };

    document.getElementById("backBtn").onclick = () => withLoading(() => goBackOneStep(), 200);

    document.getElementById("resetBtn").onclick = () => withLoading(() => {
      localStorage.removeItem(STORAGE_KEY);
      state = defaultState();
      isCustomerMode = false;
      document.body.classList.remove("customerMode");
      state.pending_return_to_step_on_done = false;
      saveState();
      render();
      showInfo("Reset complete.");
    }, 200);

    panelSelect.onchange = (e) => { state.panel_type = e.target.value; saveState(); render(); };
    csidInput.oninput = (e) => { state.csid = e.target.value.trim(); saveState(); render(); };
    regInput.oninput = (e) => { state.registration_code = e.target.value.trim(); saveState(); render(); };
    serviceInput.oninput = (e) => { state.service_number = e.target.value.trim(); saveState(); };

    makeLinkBtn.onclick = () => {
      const url = buildShareLinkFromState();
      shareLinkInput.value = url;
      copyLinkBtn.disabled = false;
      setStatus("Link generated.");
    };

    copyLinkBtn.onclick = async () => {
      try { await navigator.clipboard.writeText(shareLinkInput.value); setStatus("Link copied."); }
      catch { setStatus("Copy failed (browser permissions)."); }
    };

    const wasPrefilled = tryPrefillFromUrl();
    if (!wasPrefilled) {
      if (!state.current_step_id || !getStep(state.current_step_id)) {
        state.current_step_id = "step_1";
        state.history = ["step_1"];
        saveState();
      }
    }

    state.pending_return_to_step_on_done = false;
    saveState();
    render();
  </script>
</body>
</html>
